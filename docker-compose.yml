services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiscribe
      POSTGRES_USER: aiscribe
      POSTGRES_PASSWORD: aiscribe123
    # No host port binding — API connects via internal Docker network (db:5432).
    # Avoids conflict if another Postgres is already bound to host:5432.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiscribe"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AI Scribe API ──────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8000"
    env_file:
      - .env
    environment:
      # Use the HOST's Ollama (which is healthy and has models) instead of the sidecar container.
      OLLAMA_URL: http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_data:/app/data
      - whisper_cache:/tmp/whisper_models
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  app_data:
  whisper_cache:   # persists downloaded Whisper model across container restarts
