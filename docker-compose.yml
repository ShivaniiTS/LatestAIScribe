services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiscribe
      POSTGRES_USER: aiscribe
      POSTGRES_PASSWORD: aiscribe123
    # No host port binding — API connects via internal Docker network (db:5432).
    # Avoids conflict if another Postgres is already bound to host:5432.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiscribe"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (LLM) — optional, comment out for ASR-only testing ─────────
  # To use Ollama without a GPU, remove the `deploy` block below.
  # To skip LLM entirely, comment out this whole service and set
  # OLLAMA_URL= (empty) in .env — the ASR pipeline will still work.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    # No host port binding — api connects via internal network (ollama:11434)
    volumes:
      - ollama_models:/root/.ollama
    # ── Remove the deploy block if you have no GPU ──────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── AI Scribe API ──────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8000"
    env_file:
      - .env
    environment:
      # Use the HOST's Ollama (which is healthy and has models) instead of the sidecar container.
      OLLAMA_URL: http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_data:/app/data
      - whisper_cache:/tmp/whisper_models
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  ollama_models:
  app_data:
  whisper_cache:   # persists downloaded Whisper model across container restarts
